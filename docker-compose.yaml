services:
  db:
    image: postgres:16.9
    container_name: nova_work
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_HOST_AUTH_METHOD=trust
    ports:
      - ${DB_PORT}:5432
    command: >
      postgres 
      -c shared_preload_libraries=pg_stat_statements 
      -c pg_stat_statements.track=all 
      -c pg_stat_statements.max=10000
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: >
        sh -c "
          pg_isready -U ${DB_USER} -d ${DB_NAME} &&
          psql -U ${DB_USER} -d ${DB_NAME} -c 'CREATE EXTENSION IF NOT EXISTS pg_stat_statements;' > /dev/null 2>&1
        "
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:latest
    container_name: nova_work_redis
    restart: always
    ports:
      - ${REDIS_PORT}:6379
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
  minio:
    image: minio/minio:latest
    container_name: minio_public
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server --console-address ":9001" --address ":9000" /data
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY}
      MINIO_SERVER_URL: http://localhost:9000
    volumes:
      - minio-data:/data
    restart: always
volumes:
  pgdata:
  redis_data:
  minio-data:
